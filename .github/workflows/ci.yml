name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: glowos/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: glowos
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: glowos
        run: pnpm typecheck

      - name: Test
        working-directory: glowos
        run: pnpm test

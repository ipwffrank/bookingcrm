name: keepalive

# Pings the Railway API and Vercel frontend on a schedule so neither goes
# fully idle. Without this, Railway scales the API container to zero after
# ~5 min and the next user pays a 12-15s cold start. GitHub Actions cron
# can drift by a few minutes — that's fine, anything under ~10 min between
# pings keeps Railway warm.
#
# This workflow doesn't deploy or change anything; it just makes HTTP GETs.

on:
  schedule:
    # Every 5 minutes. Note GitHub may delay cron runs by 5-15 min during
    # high load — overall cadence still keeps the dyno warm in practice.
    - cron: "*/5 * * * *"
  workflow_dispatch: # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Railway API
        run: |
          # -m 30 caps total time at 30s so a Railway cold start can finish.
          # We don't fail the workflow on slow or non-2xx — the goal is
          # to wake the dyno, not to alert. Telemetry only.
          code=$(curl -s -o /dev/null -m 30 -w "%{http_code}" \
            https://bookingcrm-production.up.railway.app/health || true)
          echo "Railway /health → HTTP $code"

      - name: Ping Vercel frontend
        run: |
          code=$(curl -s -o /dev/null -m 30 -w "%{http_code}" \
            https://glowos-nine.vercel.app/abc || true)
          echo "Vercel /abc → HTTP $code"
